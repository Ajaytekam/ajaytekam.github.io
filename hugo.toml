baseURL = "https://ajaytekam.in/"
languageCode = "en-us"
title = "Ajay's Blog"
theme = "maverick"

[params.author]
name = "Ajay Tekam"
email = "aktekam01@gmail.com"

[permalinks]
  pages = "/:slug"

[params]
  logo = '/assets/favicon.ico'
  description = "A minimal hugo theme focus on content"
  items = 10


[taxonomies]
category = "categories"

[menu]
    [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

    [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 2

    [[menu.main]]
    identifier = "courses"
    name = "Courses"
    url = "/courses/"
    weight = 3

    [[menu.main]]
    identifier = "hireme"
    name = "Hire Me"
    url = "/hire-me/"
    weight = 4

    [[menu.main]]
    name = "Categories"
    url = "/categories/"
    weight = 5


[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    noHl = false
    style = 'monokailight'
    tabWidth = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML"]

[outputFormats.RSS]
  mediatype = "application/rss"
  baseName = "atom"

[outputFormats.JSON]
  mediatype = "application/json"
  baseName = "feed"

ignoreErrors = ["error-remote-getjson"]

[caches]
  [caches.images]
    dir = ':cacheDir/images'
